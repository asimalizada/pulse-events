name: pulse-events

services:
  postgres_orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '15433:5432'
    volumes:
      - pulse_events_dotnet_orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d orders_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pulse_events_dotnet_net

  postgres_notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '15434:5432'
    volumes:
      - pulse_events_dotnet_notifications_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d notifications_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pulse_events_dotnet_net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - '5673:5672'
      - '15673:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pulse_events_dotnet_net

  orders-service:
    build:
      context: .
      dockerfile: src/OrdersService/OrdersService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres_orders;Port=5432;Database=orders_db;Username=postgres;Password=postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - '6201:8080'
    depends_on:
      postgres_orders:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail --silent http://localhost:8080/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pulse_events_dotnet_net

  notifications-service:
    build:
      context: .
      dockerfile: src/NotificationsService/NotificationsService.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres_notifications;Port=5432;Database=notifications_db;Username=postgres;Password=postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - '6202:8080'
    depends_on:
      postgres_notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail --silent http://localhost:8080/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pulse_events_dotnet_net

volumes:
  pulse_events_dotnet_orders_db_data:
  pulse_events_dotnet_notifications_db_data:

networks:
  pulse_events_dotnet_net:
    name: pulse_events_dotnet_net
