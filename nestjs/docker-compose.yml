name: pulse-events

services:
  postgres_orders:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_db
    ports:
      - '15433:5432'
    volumes:
      - pulse_events_nestjs_orders_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d orders_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pulse_events_nestjs_net

  postgres_notifications:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notifications_db
    ports:
      - '15434:5432'
    volumes:
      - pulse_events_nestjs_notifications_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d notifications_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pulse_events_nestjs_net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - '5673:5672'
      - '15673:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pulse_events_nestjs_net

  orders-service:
    build:
      context: ./orders-service
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres@postgres_orders:5432/orders_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - '6101:5001'
    depends_on:
      postgres_orders:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://127.0.0.1:5001/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pulse_events_nestjs_net

  notifications-service:
    build:
      context: ./notifications-service
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    environment:
      PORT: 5002
      DATABASE_URL: postgresql://postgres:postgres@postgres_notifications:5432/notifications_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - '6102:5002'
    depends_on:
      postgres_notifications:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://127.0.0.1:5002/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pulse_events_nestjs_net

volumes:
  pulse_events_nestjs_orders_db_data:
  pulse_events_nestjs_notifications_db_data:

networks:
  pulse_events_nestjs_net:
    name: pulse_events_nestjs_net
